<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リサーチ写真ライブラリ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f5f5f5; color: #333; }
  header { background: #1a1a1a; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 18px; font-weight: 600; }
  .upload-btn { background: #4CAF50; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }

  .container { max-width: 1200px; margin: 0 auto; padding: 16px; }

  /* タグフィルター */
  .tag-filter { background: white; border-radius: 0 0 12px 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); position: sticky; top: 56px; z-index: 90; }
  .tag-filter-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .tag-filter-header h2 { font-size: 14px; color: #666; }
  .tag-filter-controls { display: flex; gap: 6px; align-items: center; }
  .clear-btn { background: none; border: 1px solid #ccc; padding: 5px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; color: #666; }
  .sort-btn { background: none; border: 1px solid #ccc; padding: 5px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; color: #666; }
  .sort-btn.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
  .tag-filter-hint { font-size: 12px; color: #aaa; margin-bottom: 8px; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-list.collapsed { max-height: 80px; overflow: hidden; position: relative; }
  .tag-list.collapsed::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 30px; background: linear-gradient(transparent, white); pointer-events: none; }
  .tag-toggle-btn { display: block; width: 100%; text-align: center; background: none; border: none; color: #888; font-size: 12px; cursor: pointer; padding: 6px 0 0; }
  .tag-btn { background: #f0f0f0; border: none; padding: 6px 12px; border-radius: 16px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .tag-btn.active { background: #1a1a1a; color: white; }

  /* 写真グリッド */
  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  @media (max-width: 480px) { .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; } }
  .photo-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; }
  .photo-card:hover { transform: scale(1.02); }
  .photo-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .photo-card .card-tags { padding: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .card-tag { background: #f0f0f0; font-size: 11px; padding: 2px 7px; border-radius: 10px; color: #555; }
  .photo-card .card-date { padding: 0 8px 8px; font-size: 11px; color: #999; }

  /* 空状態 */
  .empty-state { text-align: center; padding: 60px 20px; color: #999; }

  /* モーダル */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-content { background: white; border-radius: 16px; max-width: 92vw; max-height: 92vh; overflow-y: auto; width: 500px; position: relative; }
  .modal-img-wrap { overflow: hidden; border-radius: 16px 16px 0 0; background: #000; position: relative; }
  .modal-img { width: 100%; max-height: 60vh; object-fit: contain; display: block; transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease; will-change: transform, opacity; }
  .modal-img.slide-out-left  { transform: translateX(-30%); opacity: 0; }
  .modal-img.slide-out-right { transform: translateX(30%);  opacity: 0; }
  .modal-img.slide-in-left   { transform: translateX(30%);  opacity: 0; transition: none; }
  .modal-img.slide-in-right  { transform: translateX(-30%); opacity: 0; transition: none; }
  .modal-info { padding: 14px 16px 20px; }
  .modal-close { position: fixed; top: 16px; right: 16px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 38px; height: 38px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 210; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .modal-nav { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.85); border: none; border-radius: 50%; width: 42px; height: 42px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 210; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .modal-nav.prev { left: 12px; }
  .modal-nav.next { right: 12px; }
  .modal-nav:disabled { opacity: 0.3; cursor: default; }
  .modal-counter { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); color: white; padding: 4px 12px; border-radius: 12px; font-size: 13px; z-index: 210; }

  /* モーダル内セクション */
  .modal-section-label { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 14px; }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .modal-tag { background: #f0f0f0; padding: 4px 10px; border-radius: 12px; font-size: 13px; display: inline-flex; align-items: center; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .modal-tag:active { background: #ffd0d0; }
  .tag-edit-hint { font-size: 11px; color: #bbb; margin-bottom: 8px; }
  .tag-edit-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .tag-edit-input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 13px; outline: none; }
  .tag-edit-input:focus { border-color: #1a1a1a; }
  .tag-add-btn { background: #1a1a1a; color: white; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; }

  /* コメント */
  .modal-comment-textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 72px; outline: none; }
  .modal-comment-textarea:focus { border-color: #1a1a1a; }

  /* 保存・削除ボタン */
  .modal-save-btn { display: block; width: 100%; background: #4CAF50; color: white; border: none; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px; margin-bottom: 8px; }
  .modal-save-btn:disabled { background: #aaa; cursor: default; }
  .modal-dl-btn { display: block; width: 100%; background: #1a1a1a; color: white; border: none; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; margin-bottom: 8px; }
  .modal-delete-btn { display: block; width: 100%; background: none; color: #e53935; border: 1px solid #e53935; border-radius: 10px; padding: 10px; font-size: 14px; cursor: pointer; text-align: center; }
  .modal-meta { font-size: 12px; color: #999; margin-top: 12px; }

  /* ローディング */
  .loading { text-align: center; padding: 40px; color: #999; font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>リサーチ写真</h1>
  <a href="upload.html" class="upload-btn">＋ アップロード</a>
</header>

<div class="container">
  <div class="tag-filter">
    <div class="tag-filter-header">
      <h2>タグで絞り込む</h2>
      <div class="tag-filter-controls">
        <button class="sort-btn" id="sortBtn" onclick="toggleSort()">整列</button>
        <button class="clear-btn" onclick="clearTags()">クリア</button>
      </div>
    </div>
    <div class="tag-filter-hint">複数タグを選ぶと「どれかに当てはまる」写真が表示されます</div>
    <div class="tag-list collapsed" id="tagList"></div>
    <button class="tag-toggle-btn" id="tagToggleBtn" onclick="toggleTagList()">▼ もっと見る</button>
  </div>

  <div id="photoGrid" class="photo-grid">
    <div class="loading">読み込み中...</div>
  </div>
</div>

<!-- 拡大モーダル -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <button class="modal-close" onclick="closeModalDirect()">×</button>
  <button class="modal-nav prev" id="modalPrev" onclick="modalNav(-1)">‹</button>
  <button class="modal-nav next" id="modalNext" onclick="modalNav(1)">›</button>
  <div class="modal-counter" id="modalCounter"></div>
  <div class="modal-content">
    <div class="modal-img-wrap"><img class="modal-img" id="modalImg" src="" alt=""></div>
    <div class="modal-info">

      <div class="modal-section-label">タグ</div>
      <div class="modal-tags" id="modalTags"></div>
      <div class="tag-edit-hint">タグを長押しすると削除できます</div>
      <div class="tag-edit-row">
        <input class="tag-edit-input" id="tagInput" type="text" placeholder="タグを追加..." />
        <button class="tag-add-btn" onclick="addTagToModal()">+ 追加</button>
      </div>

      <div class="modal-section-label">コメント</div>
      <textarea class="modal-comment-textarea" id="modalComment" placeholder="メモや気づきを入力..."></textarea>

      <button class="modal-save-btn" id="modalSaveBtn" onclick="savePhotoData()">保存する</button>

      <a class="modal-dl-btn" id="modalDlBtn" href="" download target="_blank">↓ この写真を保存</a>
      <button class="modal-delete-btn" onclick="deletePhoto()">この写真を削除する</button>

      <div class="modal-meta" id="modalMeta"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://alwivconpehsnwkfqjez.supabase.co';
const SUPABASE_KEY = 'sb_publishable_c1r0_R5I8hUcbpca04duqA_EWrR3Fw0';

let allPhotos = [];
let activeTags = new Set();
let tagSortMode = 'none'; // 'none' | 'sorted'
let tagListExpanded = false;

async function loadPhotos() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/photos?order=uploaded_at.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    allPhotos = await res.json();
    buildTagList();
    renderPhotos(allPhotos);
  } catch(e) {
    document.getElementById('photoGrid').innerHTML = '<div class="empty-state"><p>読み込みエラー: ' + e.message + '</p></div>';
  }
}

function toggleSort() {
  tagSortMode = tagSortMode === 'sorted' ? 'none' : 'sorted';
  document.getElementById('sortBtn').classList.toggle('active', tagSortMode === 'sorted');
  buildTagList();
}

function buildTagList() {
  const tagSet = new Set();
  allPhotos.forEach(p => (p.tags || []).forEach(t => tagSet.add(t)));
  let tags = Array.from(tagSet);

  if (tagSortMode === 'sorted') {
    // 英語タグ（ABC順）→日本語タグ（あいうえお順）の順に並べる
    const isJa = t => /[\u3000-\u9FFF\uF900-\uFAFF]/.test(t);
    const enTags = tags.filter(t => !isJa(t)).sort((a, b) => a.localeCompare(b, 'en'));
    const jaTags = tags.filter(t => isJa(t)).sort((a, b) => a.localeCompare(b, 'ja'));
    tags = [...enTags, ...jaTags];
  }

  const container = document.getElementById('tagList');
  container.innerHTML = '';
  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn' + (activeTags.has(tag) ? ' active' : '');
    btn.textContent = tag;
    btn.onclick = function() { toggleTag(tag, this); };
    container.appendChild(btn);
  });

  // タグが少なければ折りたたみ不要
  const toggleBtn = document.getElementById('tagToggleBtn');
  if (tags.length <= 8) {
    container.classList.remove('collapsed');
    toggleBtn.style.display = 'none';
  } else {
    toggleBtn.style.display = 'block';
    if (!tagListExpanded) {
      container.classList.add('collapsed');
      toggleBtn.textContent = '▼ もっと見る（' + tags.length + '件）';
    } else {
      container.classList.remove('collapsed');
      toggleBtn.textContent = '▲ 折りたたむ';
    }
  }
}

function toggleTagList() {
  tagListExpanded = !tagListExpanded;
  buildTagList();
}

function toggleTag(tag, btn) {
  if (activeTags.has(tag)) { activeTags.delete(tag); btn.classList.remove('active'); }
  else { activeTags.add(tag); btn.classList.add('active'); }
  applyFilter();
}

function clearTags() {
  activeTags.clear();
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  renderPhotos(allPhotos);
}

function applyFilter() {
  if (activeTags.size === 0) { renderPhotos(allPhotos); return; }
  renderPhotos(allPhotos.filter(p => (p.tags || []).some(t => activeTags.has(t))));
}

let currentDisplayPhotos = [];

function renderPhotos(photos) {
  currentDisplayPhotos = photos;
  const grid = document.getElementById('photoGrid');
  if (!photos.length) {
    grid.innerHTML = '<div class="empty-state"><p>写真がありません</p></div>';
    return;
  }
  grid.innerHTML = photos.map((p, i) => `
    <div class="photo-card" data-index="${i}" onclick="openModalByIndex(${i})">
      <img src="${p.url}" alt="" loading="lazy">
      <div class="card-tags">${(p.tags || []).map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
      <div class="card-date">${formatDate(p.uploaded_at)}</div>
    </div>
  `).join('');
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

let currentModalIndex = 0;

function openModalByIndex(idx) {
  currentModalIndex = idx;
  showModalPhoto(idx);
  document.getElementById('modal').classList.add('open');
}

function showModalPhoto(idx) {
  const photos = currentDisplayPhotos;
  if (!photos.length) return;
  idx = Math.max(0, Math.min(idx, photos.length - 1));
  currentModalIndex = idx;
  const p = photos[idx];
  const dlUrl = p.url.replace('/upload/', '/upload/fl_attachment/');

  document.getElementById('modalImg').src = p.url;
  renderModalTags(p.tags || []);
  document.getElementById('tagInput').value = '';
  document.getElementById('modalComment').value = p.comment || '';
  document.getElementById('modalSaveBtn').textContent = '保存する';
  document.getElementById('modalSaveBtn').disabled = false;
  document.getElementById('modalDlBtn').href = dlUrl;
  document.getElementById('modalMeta').textContent = `${formatDate(p.uploaded_at)}${p.uploaded_by ? '　by ' + p.uploaded_by : ''}`;
  document.getElementById('modalCounter').textContent = `${idx + 1} / ${photos.length}`;
  document.getElementById('modalPrev').disabled = idx === 0;
  document.getElementById('modalNext').disabled = idx === photos.length - 1;
}

function renderModalTags(tags) {
  document.getElementById('modalTags').innerHTML = tags.map(t =>
    `<span class="modal-tag" data-tag="${t}">${t}</span>`
  ).join('');
  document.querySelectorAll('#modalTags .modal-tag').forEach(el => {
    let timer;
    el.addEventListener('touchstart', () => {
      timer = setTimeout(() => {
        if (confirm(`「${el.dataset.tag}」を削除しますか？`)) removeTagFromModal(el.dataset.tag);
      }, 600);
    });
    el.addEventListener('touchend', () => clearTimeout(timer));
    el.addEventListener('touchmove', () => clearTimeout(timer));
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      if (confirm(`「${el.dataset.tag}」を削除しますか？`)) removeTagFromModal(el.dataset.tag);
    });
  });
}

function getCurrentModalTags() {
  return Array.from(document.querySelectorAll('#modalTags .modal-tag')).map(el => el.dataset.tag);
}

function addTagToModal() {
  const input = document.getElementById('tagInput');
  const tag = input.value.trim();
  if (!tag) return;
  const current = getCurrentModalTags();
  if (!current.includes(tag)) renderModalTags([...current, tag]);
  input.value = '';
}

function removeTagFromModal(tag) {
  renderModalTags(getCurrentModalTags().filter(t => t !== tag));
}

async function savePhotoData() {
  const btn = document.getElementById('modalSaveBtn');
  const p = currentDisplayPhotos[currentModalIndex];
  if (!p) return;
  const tags = getCurrentModalTags();
  const comment = document.getElementById('modalComment').value.trim();
  btn.disabled = true;
  btn.textContent = '保存中...';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/photos?id=eq.${p.id}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify({ tags, comment })
    });
    if (res.ok) {
      p.tags = tags;
      p.comment = comment;
      btn.textContent = '保存完了!';
      buildTagList();
      setTimeout(() => { btn.textContent = '保存する'; btn.disabled = false; }, 1500);
    } else {
      btn.textContent = 'エラー';
      btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = 'エラー';
    btn.disabled = false;
  }
}

async function deletePhoto() {
  const p = currentDisplayPhotos[currentModalIndex];
  if (!p) return;
  if (!confirm('この写真を削除しますか？\n（元に戻せません）')) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/photos?id=eq.${p.id}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (res.ok) {
      closeModalDirect();
      allPhotos = allPhotos.filter(x => x.id !== p.id);
      buildTagList();
      applyFilter();
    } else {
      alert('削除に失敗しました');
    }
  } catch(e) {
    alert('削除エラー: ' + e.message);
  }
}

function modalNav(dir) {
  const img = document.getElementById('modalImg');
  const outClass = dir > 0 ? 'slide-out-left' : 'slide-out-right';
  const inClass  = dir > 0 ? 'slide-in-left'  : 'slide-in-right';
  img.classList.add(outClass);
  setTimeout(() => {
    img.classList.remove(outClass);
    img.classList.add(inClass);
    showModalPhoto(currentModalIndex + dir);
    // 次フレームでアニメーション開始
    requestAnimationFrame(() => requestAnimationFrame(() => {
      img.classList.remove(inClass);
    }));
  }, 200);
}

function closeModalDirect() { document.getElementById('modal').classList.remove('open'); }

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('modal').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') modalNav(-1);
  if (e.key === 'ArrowRight') modalNav(1);
  if (e.key === 'Escape') closeModalDirect();
});

let touchStartX = 0;
let touchStartTime = 0;
document.getElementById('modal').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartTime = Date.now();
}, { passive: true });
document.getElementById('modal').addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  const elapsed = Date.now() - touchStartTime;
  const velocity = Math.abs(diff) / elapsed; // px/ms
  // 素早いフリック（velocity > 0.3）または十分な移動距離（> 50px）で切り替え
  if (velocity > 0.3 || Math.abs(diff) > 50) {
    modalNav(diff > 0 ? 1 : -1);
  }
}, { passive: true });

document.getElementById('tagInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTagToModal();
});

loadPhotos();
</script>
</body>
</html>
