<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リサーチ写真ライブラリ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f5f5f5; color: #333; }
  header { background: #1a1a1a; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 18px; font-weight: 600; }
  .upload-btn { background: #4CAF50; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
  .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
  
  /* タグフィルター */
  .tag-filter { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .tag-filter h2 { font-size: 14px; color: #666; margin-bottom: 10px; }
  .tag-filter-hint { font-size: 12px; color: #aaa; margin-bottom: 8px; }
  .clear-btn { background: none; border: 1px solid #ccc; padding: 5px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; color: #666; margin-left: 4px; }
  .clear-btn:hover { background: #f0f0f0; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-btn { background: #f0f0f0; border: none; padding: 6px 12px; border-radius: 16px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .tag-btn.active { background: #1a1a1a; color: white; }
  .tag-btn:hover { background: #ddd; }
  .tag-btn.active:hover { background: #333; }

  /* 写真グリッド */
  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  @media (max-width: 480px) { .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; } }
  .photo-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; }
  .photo-card:hover { transform: scale(1.02); }
  .photo-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .photo-card .card-tags { padding: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .card-tag { background: #f0f0f0; font-size: 11px; padding: 2px 7px; border-radius: 10px; color: #555; }
  .photo-card .card-date { padding: 0 8px 8px; font-size: 11px; color: #999; }

  /* 空状態 */
  .empty-state { text-align: center; padding: 60px 20px; color: #999; }
  .empty-state p { font-size: 16px; margin-bottom: 8px; }
  .empty-state small { font-size: 13px; }

  /* モーダル */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-content { background: white; border-radius: 16px; max-width: 92vw; max-height: 92vh; overflow-y: auto; width: 500px; position: relative; }
  .modal-img { width: 100%; max-height: 65vh; object-fit: contain; background: #000; border-radius: 16px 16px 0 0; display: block; }
  .modal-info { padding: 14px 16px; }
  .modal-info .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .modal-info .modal-tag { background: #f0f0f0; padding: 4px 10px; border-radius: 12px; font-size: 13px; }
  .modal-info .modal-meta { font-size: 12px; color: #999; margin-bottom: 12px; }
  .modal-dl-btn { display: block; width: 100%; background: #1a1a1a; color: white; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; }
  .modal-dl-btn:hover { background: #333; }
  .modal-close { position: fixed; top: 16px; right: 16px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 38px; height: 38px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 210; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .modal-nav { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.85); border: none; border-radius: 50%; width: 42px; height: 42px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 210; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .modal-nav.prev { left: 12px; }
  .modal-nav.next { right: 12px; }
  .modal-nav:disabled { opacity: 0.3; cursor: default; }
  .modal-counter { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); color: white; padding: 4px 12px; border-radius: 12px; font-size: 13px; z-index: 210; }

  /* タグ編集 */
  .modal-tag { background: #f0f0f0; padding: 4px 10px; border-radius: 12px; font-size: 13px; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .modal-tag:active { background: #ffd0d0; }
  .tag-edit-hint { font-size: 11px; color: #bbb; margin-bottom: 6px; }
  .tag-edit-row { display: flex; gap: 6px; margin-top: 10px; margin-bottom: 10px; }
  .tag-edit-input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 13px; outline: none; }
  .tag-edit-input:focus { border-color: #1a1a1a; }
  .tag-add-btn { background: #1a1a1a; color: white; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .tag-save-btn { display: block; width: 100%; background: #4CAF50; color: white; border: none; border-radius: 10px; padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
  .tag-save-btn:hover { background: #43a047; }
  .tag-save-btn:disabled { background: #aaa; cursor: default; }

  /* ローディング */
  .loading { text-align: center; padding: 40px; color: #999; font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>リサーチ写真</h1>
  <a href="upload.html" class="upload-btn">＋ アップロード</a>
</header>

<div class="container">
  <div class="tag-filter">
    <h2>タグで絞り込む <button class="clear-btn" onclick="clearTags()">クリア</button></h2>
    <div class="tag-filter-hint">複数タグを選ぶと「どれかに当てはまる」写真が表示されます</div>
    <div class="tag-list" id="tagList"></div>
  </div>

  <div id="photoGrid" class="photo-grid">
    <div class="loading">読み込み中...</div>
  </div>
</div>

<!-- 拡大モーダル -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <button class="modal-close" onclick="closeModalDirect()">×</button>
  <button class="modal-nav prev" id="modalPrev" onclick="modalNav(-1)">‹</button>
  <button class="modal-nav next" id="modalNext" onclick="modalNav(1)">›</button>
  <div class="modal-counter" id="modalCounter"></div>
  <div class="modal-content">
    <img class="modal-img" id="modalImg" src="" alt="">
    <div class="modal-info">
      <div class="modal-tags" id="modalTags"></div>
      <div class="tag-edit-hint">タグを長押しすると削除できます</div>
      <div class="tag-edit-row">
        <input class="tag-edit-input" id="tagInput" type="text" placeholder="タグを追加..." />
        <button class="tag-add-btn" onclick="addTagToModal()">+ 追加</button>
      </div>
      <button class="tag-save-btn" id="tagSaveBtn" onclick="saveTags()">タグを保存</button>
      <div class="modal-meta" id="modalMeta"></div>
      <a class="modal-dl-btn" id="modalDlBtn" href="" download target="_blank">↓ この写真を保存</a>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://alwivconpehsnwkfqjez.supabase.co';
const SUPABASE_KEY = 'sb_publishable_c1r0_R5I8hUcbpca04duqA_EWrR3Fw0';

let allPhotos = [];
let activeTags = new Set();

async function loadPhotos() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/photos?order=uploaded_at.desc`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    allPhotos = await res.json();
    buildTagList();
    renderPhotos(allPhotos);
  } catch(e) {
    document.getElementById('photoGrid').innerHTML = '<div class="empty-state"><p>読み込みエラー</p><small>' + e.message + '</small></div>';
  }
}

function buildTagList() {
  const tagSet = new Set();
  allPhotos.forEach(p => (p.tags || []).forEach(t => tagSet.add(t)));
  const container = document.getElementById('tagList');
  container.innerHTML = '';
  tagSet.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn' + (activeTags.has(tag) ? ' active' : '');
    btn.textContent = tag;
    btn.onclick = function() { toggleTag(tag, this); };
    container.appendChild(btn);
  });
}

function toggleTag(tag, btn) {
  if (activeTags.has(tag)) {
    activeTags.delete(tag);
    btn.classList.remove('active');
  } else {
    activeTags.add(tag);
    btn.classList.add('active');
  }
  applyFilter();
}

function clearTags() {
  activeTags.clear();
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  renderPhotos(allPhotos);
}

function applyFilter() {
  if (activeTags.size === 0) {
    renderPhotos(allPhotos);
    return;
  }
  const filtered = allPhotos.filter(p =>
    (p.tags || []).some(t => activeTags.has(t))
  );
  renderPhotos(filtered);
}

let currentDisplayPhotos = [];

function renderPhotos(photos) {
  currentDisplayPhotos = photos;
  const grid = document.getElementById('photoGrid');
  if (!photos.length) {
    grid.innerHTML = '<div class="empty-state"><p>写真がありません</p><small>アップロードボタンから追加してください</small></div>';
    return;
  }
  grid.innerHTML = photos.map((p, i) => `
    <div class="photo-card" data-index="${i}" onclick="openModalByIndex(${i})">
      <img src="${p.url}" alt="" loading="lazy">
      <div class="card-tags">${(p.tags || []).map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
      <div class="card-date">${formatDate(p.uploaded_at)}</div>
    </div>
  `).join('');
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

let currentModalIndex = 0;

function openModalByIndex(idx) {
  currentModalIndex = idx;
  showModalPhoto(idx);
  document.getElementById('modal').classList.add('open');
}

function showModalPhoto(idx) {
  const photos = currentDisplayPhotos;
  if (!photos.length) return;
  idx = Math.max(0, Math.min(idx, photos.length - 1));
  currentModalIndex = idx;
  const p = photos[idx];
  const url = p.url;
  const tags = p.tags || [];
  const date = p.uploaded_at || '';
  const by = p.uploaded_by || '';
  const dlUrl = url.replace('/upload/', '/upload/fl_attachment/');

  document.getElementById('modalImg').src = url;
  renderModalTags(tags);
  document.getElementById('tagInput').value = '';
  document.getElementById('tagSaveBtn').textContent = 'タグを保存';
  document.getElementById('tagSaveBtn').disabled = false;
  document.getElementById('modalMeta').textContent = `${formatDate(date)}${by ? '　by ' + by : ''}`;
  document.getElementById('modalDlBtn').href = dlUrl;
  document.getElementById('modalCounter').textContent = `${idx + 1} / ${photos.length}`;
  document.getElementById('modalPrev').disabled = idx === 0;
  document.getElementById('modalNext').disabled = idx === photos.length - 1;
}

function renderModalTags(tags) {
  document.getElementById('modalTags').innerHTML = tags.map(t =>
    `<span class="modal-tag" data-tag="${t}">${t}</span>`
  ).join('');

  // 各タグに長押しイベントを設定
  document.querySelectorAll('#modalTags .modal-tag').forEach(el => {
    let timer;
    el.addEventListener('touchstart', () => {
      timer = setTimeout(() => {
        const tag = el.dataset.tag;
        if (confirm(`「${tag}」を削除しますか？`)) {
          removeTagFromModal(tag);
        }
      }, 600);
    });
    el.addEventListener('touchend', () => clearTimeout(timer));
    el.addEventListener('touchmove', () => clearTimeout(timer));
    // PC対応：右クリックで削除
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      const tag = el.dataset.tag;
      if (confirm(`「${tag}」を削除しますか？`)) {
        removeTagFromModal(tag);
      }
    });
  });
}

function getCurrentModalTags() {
  return Array.from(document.querySelectorAll('#modalTags .modal-tag')).map(el => el.childNodes[0].textContent.trim());
}

function addTagToModal() {
  const input = document.getElementById('tagInput');
  const tag = input.value.trim();
  if (!tag) return;
  const current = getCurrentModalTags();
  if (current.includes(tag)) { input.value = ''; return; }
  renderModalTags([...current, tag]);
  input.value = '';
}

function removeTagFromModal(tag) {
  const current = getCurrentModalTags().filter(t => t !== tag);
  renderModalTags(current);
}

async function saveTags() {
  const btn = document.getElementById('tagSaveBtn');
  const tags = getCurrentModalTags();
  const p = currentDisplayPhotos[currentModalIndex];
  if (!p) return;
  btn.disabled = true;
  btn.textContent = '保存中...';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/photos?id=eq.${p.id}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify({ tags })
    });
    if (res.ok) {
      p.tags = tags;
      btn.textContent = '保存完了!';
      buildTagList();
      setTimeout(() => { btn.textContent = 'タグを保存'; btn.disabled = false; }, 1500);
    } else {
      btn.textContent = 'エラー';
      btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = 'エラー';
    btn.disabled = false;
  }
}

// Enterキーでタグ追加
document.getElementById('tagInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addTagToModal();
});

function modalNav(dir) {
  showModalPhoto(currentModalIndex + dir);
}

function closeModalDirect() {
  document.getElementById('modal').classList.remove('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

// キーボード操作
document.addEventListener('keydown', e => {
  if (!document.getElementById('modal').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') modalNav(-1);
  if (e.key === 'ArrowRight') modalNav(1);
  if (e.key === 'Escape') closeModalDirect();
});

// スワイプ操作
let touchStartX = 0;
document.getElementById('modal').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.getElementById('modal').addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) modalNav(diff > 0 ? 1 : -1);
});

loadPhotos();
</script>
</body>
</html>
