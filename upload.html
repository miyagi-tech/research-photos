<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="リサーチ写真">
<link rel="apple-touch-icon" href="icon.png">
<title>写真をアップロード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f5f5f5; color: #333; }
  header { background: #1a1a1a; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  header a { color: white; text-decoration: none; font-size: 20px; }
  header h1 { font-size: 18px; font-weight: 600; }
  .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }

  /* 写真選択エリア */
  .photo-drop { border: 2px dashed #ccc; border-radius: 16px; background: white; text-align: center; padding: 40px 20px; cursor: pointer; transition: border-color 0.2s; margin-bottom: 20px; }
  .photo-drop:hover, .photo-drop.dragover { border-color: #4CAF50; }
  .photo-drop input { display: none; }
  .photo-drop .icon { font-size: 48px; margin-bottom: 12px; }
  .photo-drop p { color: #666; font-size: 15px; }
  .photo-drop small { color: #999; font-size: 13px; }
  .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 16px; }
  .preview-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; }
  .preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .preview-item .remove { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  /* タグ */
  .section { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .section h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .preset-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .preset-tag { background: #f0f0f0; border: 2px solid transparent; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .preset-tag.selected { background: #1a1a1a; color: white; border-color: #1a1a1a; }
  .tag-input-row { display: flex; gap: 8px; }
  .tag-input-row input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 8px 14px; font-size: 14px; outline: none; }
  .tag-input-row input:focus { border-color: #4CAF50; }
  .tag-input-row button { background: #4CAF50; color: white; border: none; border-radius: 20px; padding: 8px 16px; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .selected-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; min-height: 28px; }
  .sel-tag { background: #1a1a1a; color: white; padding: 4px 10px; border-radius: 12px; font-size: 13px; display: flex; align-items: center; gap: 4px; }
  .sel-tag button { background: none; border: none; color: white; cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }

  /* 投稿者名 */
  .name-input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; }
  .name-input:focus { border-color: #4CAF50; }

  /* 送信ボタン */
  .submit-btn { width: 100%; background: #1a1a1a; color: white; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .submit-btn:hover { background: #333; }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* プログレス */
  .progress { display: none; background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center; }
  .progress.show { display: block; }
  .progress-bar-wrap { background: #f0f0f0; border-radius: 10px; height: 8px; margin: 12px 0; overflow: hidden; }
  .progress-bar { background: #4CAF50; height: 100%; border-radius: 10px; transition: width 0.3s; width: 0%; }
  .progress-text { font-size: 14px; color: #666; }

  /* 完了 */
  .success { display: none; background: #e8f5e9; border-radius: 12px; padding: 20px; margin-bottom: 16px; text-align: center; }
  .success.show { display: block; }
  .success p { color: #2e7d32; font-size: 15px; margin-bottom: 12px; }
  .success a { color: #1a1a1a; font-weight: 600; text-decoration: none; border-bottom: 1px solid; }
</style>
</head>
<body>

<header>
  <a href="index.html">←</a>
  <h1>写真をアップロード</h1>
</header>

<div class="container">

  <!-- 写真選択 -->
  <div class="photo-drop" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept="image/*" multiple>
    <div class="icon">📷</div>
    <p>タップして写真を選択</p>
    <small>複数枚まとめて選べます</small>
    <div class="preview-grid" id="previewGrid"></div>
  </div>

  <!-- タグ選択 -->
  <div class="section">
    <h2>タグを選ぶ</h2>
    <div class="preset-tags" id="presetTags">
      <button class="preset-tag" onclick="togglePreset(this)">他社事例</button>
      <button class="preset-tag" onclick="togglePreset(this)">W事例</button>
      <button class="preset-tag" onclick="togglePreset(this)">アトモス</button>
      <button class="preset-tag" onclick="togglePreset(this)">ファサード</button>
      <button class="preset-tag" onclick="togglePreset(this)">VMD</button>
      <button class="preset-tag" onclick="togglePreset(this)">ZARA</button>
      <button class="preset-tag" onclick="togglePreset(this)">H&G</button>
    </div>
    <div class="tag-input-row">
      <input type="text" id="customTagInput" placeholder="新しいタグを入力..." onkeydown="if(event.key==='Enter'){addCustomTag();}">
      <button onclick="addCustomTag()">追加</button>
    </div>
    <div class="selected-tags" id="selectedTags"></div>
  </div>

  <!-- 投稿者名 -->
  <div class="section">
    <h2>投稿者名（任意）</h2>
    <input type="text" class="name-input" id="uploaderName" placeholder="例：ミヤギ">
  </div>

  <!-- プログレス -->
  <div class="progress" id="progressArea">
    <div class="progress-text" id="progressText">アップロード中...</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <!-- 完了メッセージ -->
  <div class="success" id="successArea">
    <p>✅ アップロード完了！</p>
    <a href="index.html">← 写真一覧に戻る</a>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="uploadAll()">アップロードする</button>
</div>

<script>
const SUPABASE_URL = 'https://alwivconpehsnwkfqjez.supabase.co';
const SUPABASE_KEY = 'sb_publishable_c1r0_R5I8hUcbpca04duqA_EWrR3Fw0';
const CLOUDINARY_CLOUD = 'dadmznma0';
const CLOUDINARY_PRESET = 'research_photos'; // unsigned upload preset

let selectedFiles = [];
let selectedTags = [];

// ファイル選択
document.getElementById('fileInput').addEventListener('change', function(e) {
  handleFiles(Array.from(e.target.files));
});

// ドラッグ&ドロップ
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
});

function handleFiles(files) {
  selectedFiles = [...selectedFiles, ...files];
  renderPreviews();
}

function renderPreviews() {
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = selectedFiles.map((f, i) => {
    const url = URL.createObjectURL(f);
    return `<div class="preview-item">
      <img src="${url}" alt="">
      <button class="remove" onclick="removeFile(${i}, event)">×</button>
    </div>`;
  }).join('');
}

function removeFile(i, e) {
  e.stopPropagation();
  selectedFiles.splice(i, 1);
  renderPreviews();
}

// タグ
function togglePreset(btn) {
  const tag = btn.textContent;
  if (btn.classList.toggle('selected')) {
    addTag(tag);
  } else {
    removeTag(tag);
  }
}

function addCustomTag() {
  const input = document.getElementById('customTagInput');
  const tag = input.value.trim();
  if (tag && !selectedTags.includes(tag)) {
    addTag(tag);
    input.value = '';
  }
}

function addTag(tag) {
  if (!selectedTags.includes(tag)) {
    selectedTags.push(tag);
    renderSelectedTags();
  }
}

function removeTag(tag) {
  selectedTags = selectedTags.filter(t => t !== tag);
  // プリセットボタンの選択解除
  document.querySelectorAll('.preset-tag').forEach(btn => {
    if (btn.textContent === tag) btn.classList.remove('selected');
  });
  renderSelectedTags();
}

function renderSelectedTags() {
  document.getElementById('selectedTags').innerHTML = selectedTags.map(t =>
    `<span class="sel-tag">${t}<button onclick="removeTag('${t}')">×</button></span>`
  ).join('');
}

// アップロード
async function uploadAll() {
  if (selectedFiles.length === 0) {
    alert('写真を選択してください');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  document.getElementById('progressArea').classList.add('show');
  document.getElementById('successArea').classList.remove('show');

  const uploaderName = document.getElementById('uploaderName').value.trim();
  let done = 0;

  for (const file of selectedFiles) {
    try {
      // Cloudinaryにアップロード
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CLOUDINARY_PRESET);

      const cloudRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
        method: 'POST',
        body: formData
      });
      const cloudData = await cloudRes.json();

      if (!cloudData.secure_url) throw new Error('Cloudinaryアップロード失敗');

      // Supabaseにメタデータ保存
      await fetch(`${SUPABASE_URL}/rest/v1/photos`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          url: cloudData.secure_url,
          tags: selectedTags,
          uploaded_by: uploaderName || null
        })
      });

      done++;
      const pct = Math.round(done / selectedFiles.length * 100);
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${done} / ${selectedFiles.length} 枚完了`;

    } catch(e) {
      alert('エラー: ' + e.message);
      btn.disabled = false;
      return;
    }
  }

  document.getElementById('progressArea').classList.remove('show');
  document.getElementById('successArea').classList.add('show');
  btn.disabled = false;
  selectedFiles = [];
  renderPreviews();
}
</script>
</body>
</html>
